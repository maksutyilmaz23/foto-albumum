apply plugin: 'com.android.application'

android {
    namespace 'com.mesut.fotoalbum'
    compileSdk 34

    defaultConfig {
        applicationId "com.mesut.fotoalbum"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.core:core:1.12.0'
}
