<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Foto Albümüm</title>
<script src="libs/jspdf.umd.min.js"></script>
<script src="libs/html2canvas.min.js"></script>
<style>
  :root{
    --paper:#f6f1e7;
    --ink:#2b2420;
    --line:#d8cdb8;
    --accent:#a8562e;
    --accent-dark:#7c3f21;
    --card:#fffdf9;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
  body{padding-bottom:90px;}
  header{position:sticky;top:0;z-index:10;background:var(--paper);
    border-bottom:1px solid var(--line);padding:16px 16px 12px;}
  header h1{margin:0;font-size:21px;letter-spacing:.3px;font-weight:700;}
  header p{margin:4px 0 0;font-size:13px;color:#7a6f60;}
  .toolbar{display:flex;gap:8px;padding:12px 16px 0;flex-wrap:wrap;}
  .btn{border:none;border-radius:10px;padding:11px 16px;font-size:14px;font-weight:600;
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:active{background:var(--accent-dark);}
  .btn-ghost{background:#eee3cf;color:var(--ink);}
  .btn-ghost:active{background:#e2d3b4;}
  #fileInput{display:none;}
  #empty{margin:60px 24px;text-align:center;color:#9a8f7e;}
  #empty .big{font-size:40px;margin-bottom:10px;}
  #grid{padding:16px;display:flex;flex-direction:column;gap:16px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    box-shadow:0 1px 3px rgba(43,36,32,.06);}
  .card .num{font-size:11px;color:#a8562e;font-weight:700;letter-spacing:.5px;
    padding:10px 14px 0;text-transform:uppercase;}
  .card .imgFrame{width:100%;overflow:hidden;background:#eee3cf;}
  .card .imgFrame img{width:100%;height:100%;display:block;object-fit:cover;}
  .card textarea{width:100%;border:none;resize:vertical;min-height:56px;padding:12px 14px;
    font-size:14px;font-family:inherit;color:var(--ink);background:transparent;outline:none;}
  .card textarea::placeholder{color:#b0a48f;}
  .card-actions{display:flex;border-top:1px solid var(--line);}
  .card-actions button{flex:1;border:none;background:none;padding:11px 0;font-size:13px;
    color:#7a6f60;font-weight:600;}
  .card-actions button:active{background:#f0e8d8;}
  .card-actions button.danger{color:#b23a2e;}
  #cropModal{position:fixed;inset:0;background:rgba(43,36,32,.85);display:none;
    align-items:center;justify-content:center;z-index:55;padding:16px;}
  #cropModal .box{background:var(--card);border-radius:14px;width:100%;max-width:420px;
    padding:16px;}
  #cropModal h3{margin:0 0 4px;font-size:15px;}
  #cropModal p.hint{margin:0 0 12px;font-size:12px;color:#7a6f60;}
  #cropFrame{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;border-radius:10px;
    background:#111;touch-action:none;}
  #cropFrame img{position:absolute;left:0;top:0;transform-origin:0 0;user-select:none;
    -webkit-user-drag:none;pointer-events:none;}
  #cropModal input[type=range]{width:100%;margin-top:14px;}
  #cropModal .zoomLabel{font-size:12px;color:#7a6f60;display:flex;justify-content:space-between;}
  .orientRow{display:flex;gap:8px;margin:12px 0;}
  .orientRow button{flex:1;border:1px solid var(--line);background:#f6f1e7;
    border-radius:8px;padding:9px 0;font-size:13px;font-weight:600;color:#7a6f60;}
  .orientRow button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .orientRow button.active::after{content:' ✓';}
  #cropModal .row{display:flex;gap:8px;margin-top:16px;}
  #cropModal .row .btn{flex:1;justify-content:center;}
  footer.bar{position:fixed;bottom:0;left:0;right:0;background:var(--paper);
    border-top:1px solid var(--line);padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    display:flex;gap:10px;}
  footer.bar .btn{flex:1;justify-content:center;}
  #pdfOverlay{position:fixed;inset:0;background:rgba(43,36,32,.55);display:none;
    align-items:center;justify-content:center;z-index:50;}
  #pdfOverlay .box{background:var(--card);padding:22px 26px;border-radius:14px;text-align:center;
    font-size:14px;max-width:80%;}
  #titleModal{position:fixed;inset:0;background:rgba(43,36,32,.55);display:none;
    align-items:center;justify-content:center;z-index:50;padding:20px;}
  #titleModal .box{background:var(--card);padding:20px;border-radius:14px;width:100%;max-width:360px;}
  #titleModal input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;
    font-size:15px;margin-top:10px;font-family:inherit;}
  #titleModal .row{display:flex;gap:8px;margin-top:16px;}
  #titleModal .row .btn{flex:1;justify-content:center;}
  #toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#2b2420;color:#fffdf9;padding:11px 20px;border-radius:10px;font-size:13px;
    font-weight:600;opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;z-index:60;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <h1>📔 Foto Albümüm</h1>
  <p>Fotoğraf ekle, altına not yaz, PDF fotokitap olarak dışa aktar.</p>
</header>

<div class="toolbar">
  <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">＋ Fotoğraf Ekle</button>
  <button class="btn btn-ghost" onclick="saveNow()">💾 Kaydet</button>
  <button class="btn btn-ghost" onclick="openTitleModal()">📕 PDF Oluştur</button>
</div>
<div class="toolbar">
  <button class="btn btn-ghost" onclick="exportBackup()">⬇️ JSON Yedek Al</button>
  <button class="btn btn-ghost" onclick="document.getElementById('jsonInput').click()">⬆️ Yedekten Yükle</button>
</div>
<input type="file" id="fileInput" accept="image/*" multiple>
<input type="file" id="jsonInput" accept="application/json,.json">

<div id="toast"></div>

<div id="empty">
  <div class="big">🖼️</div>
  Henüz fotoğraf eklenmedi.<br>Başlamak için "Fotoğraf Ekle" butonuna dokun.
</div>

<div id="grid"></div>

<div id="titleModal">
  <div class="box">
    <strong>Albüm Başlığı</strong>
    <input id="albumTitleInput" type="text" placeholder="Örn. Yaz Tatili 2026" maxlength="80">
    <div class="orientRow" style="margin-top:14px;">
      <button id="layout1Btn" onclick="setPdfLayout(1)">1 / sayfa</button>
      <button id="layout2Btn" onclick="setPdfLayout(2)">2 / sayfa</button>
      <button id="layout4Btn" onclick="setPdfLayout(4)">4 / sayfa</button>
    </div>
    <div id="layoutSelectedLabel" style="text-align:center;font-size:12px;color:#7a6f60;margin-top:2px;"></div>
    <div class="row">
      <button class="btn btn-ghost" onclick="closeTitleModal()">Vazgeç</button>
      <button class="btn btn-primary" onclick="exportPdf()">Oluştur</button>
    </div>
  </div>
</div>

<div id="pdfOverlay"><div class="box">PDF hazırlanıyor…<br><small id="pdfProgress"></small></div></div>

<div id="cropModal">
  <div class="box">
    <h3>Fotoğrafı Kırp</h3>
    <p class="hint">Konumlamak için sürükle, yakınlaştırmak için kaydırıcıyı kullan.</p>
    <div class="orientRow">
      <button id="orientLandscapeBtn" onclick="setCropOrientation('landscape')">▭ Yatay</button>
      <button id="orientPortraitBtn" onclick="setCropOrientation('portrait')">▯ Dikey</button>
    </div>
    <div id="cropFrame">
      <img id="cropImg" src="" alt="">
    </div>
    <div class="zoomLabel"><span>Uzak</span><span>Yakın</span></div>
    <input type="range" id="cropZoom" min="100" max="300" value="100">
    <div class="row">
      <button class="btn btn-ghost" onclick="closeCropEditor()">Vazgeç</button>
      <button class="btn btn-primary" onclick="saveCrop()">Kaydet</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'fotoalbum_v1';
let photos = []; // {id, dataUrl, note}

function uid(){ return 'p' + Date.now() + Math.random().toString(36).slice(2,8); }

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    photos = raw ? JSON.parse(raw) : [];
  }catch(e){ photos = []; }
}
function save(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(photos)); }
  catch(e){ alert('Depolama alanı dolu olabilir. Bazı fotoğrafları silmeyi deneyin.'); }
}

function render(){
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if(photos.length === 0){
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = photos.map((p, i) => `
    <div class="card" data-id="${p.id}">
      <div class="num">Sayfa ${i+1} / ${photos.length}</div>
      <div class="imgFrame" style="aspect-ratio:${p.orientation === 'portrait' ? '3/4' : '4/3'};"><img src="${p.cropDataUrl || p.dataUrl}" alt="fotoğraf ${i+1}"></div>
      <textarea placeholder="Bu fotoğraf için not yaz…" oninput="updateNote('${p.id}', this.value)">${escapeHtml(p.note||'')}</textarea>
      <div class="card-actions">
        <button onclick="openCropEditor('${p.id}')">✂️ Kırp</button>
        <button onclick="moveUp('${p.id}')">↑ Yukarı</button>
        <button onclick="moveDown('${p.id}')">↓ Aşağı</button>
        <button class="danger" onclick="removePhoto('${p.id}')">🗑 Sil</button>
      </div>
    </div>
  `).join('');
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.innerText = s;
  return d.innerHTML;
}

function updateNote(id, value){
  const p = photos.find(x => x.id === id);
  if(p){ p.note = value; save(); }
}

function moveUp(id){
  const i = photos.findIndex(x => x.id === id);
  if(i > 0){ [photos[i-1], photos[i]] = [photos[i], photos[i-1]]; save(); render(); }
}
function moveDown(id){
  const i = photos.findIndex(x => x.id === id);
  if(i < photos.length - 1){ [photos[i+1], photos[i]] = [photos[i], photos[i+1]]; save(); render(); }
}
function removePhoto(id){
  if(!confirm('Bu fotoğrafı silmek istediğine emin misin?')) return;
  photos = photos.filter(x => x.id !== id);
  save(); render();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._h);
  showToast._h = setTimeout(() => t.classList.remove('show'), 2200);
}

function saveNow(){
  save();
  showToast('Kaydedildi ✓');
}

function downloadOrBridgeText(text, fileName){
  if (window.AndroidFileSaver) {
    window.AndroidFileSaver.saveText(text, fileName);
  } else {
    const blob = new Blob([text], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }
}

function exportBackup(){
  if(photos.length === 0){ alert('Yedeklenecek fotoğraf yok.'); return; }
  const backup = {
    app: 'FotoAlbumum',
    version: 1,
    exportedAt: new Date().toISOString(),
    photos: photos
  };
  const fileName = `foto-albumu-yedek-${new Date().toISOString().slice(0,10)}.json`;
  downloadOrBridgeText(JSON.stringify(backup), fileName);
  showToast('JSON yedek indirildi');
}

document.getElementById('jsonInput').addEventListener('change', function(e){
  const file = e.target.files && e.target.files[0];
  e.target.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    let data;
    try{ data = JSON.parse(ev.target.result); }
    catch(err){ alert('Geçersiz yedek dosyası.'); return; }
    const incoming = Array.isArray(data) ? data : data.photos;
    if(!Array.isArray(incoming)){ alert('Bu dosya bir Foto Albümüm yedeği değil.'); return; }
    const replace = photos.length === 0 || confirm(
      'Mevcut albümdeki fotoğrafların üzerine mi yazılsın?\n' +
      'Tamam: üzerine yaz   İptal: sona ekle'
    );
    if(replace){
      photos = incoming;
    } else {
      photos = photos.concat(incoming.map(p => ({ ...p, id: uid() })));
    }
    save(); render();
    showToast('Yedek yüklendi ✓');
  };
  reader.readAsText(file);
});

document.getElementById('fileInput').addEventListener('change', function(e){
  const files = Array.from(e.target.files || []);
  let pending = files.length;
  if(pending === 0) return;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(ev){
      // downscale large images to keep storage/PDF manageable
      const img = new Image();
      img.onload = function(){
        const maxDim = 1600;
        let {width, height} = img;
        if(width > maxDim || height > maxDim){
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        photos.push({ id: uid(), dataUrl: canvas.toDataURL('image/jpeg', 0.85), note: '' });
        pending--;
        if(pending === 0){ save(); render(); }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
});

// ---- Fotoğraf kırpma editörü ----
let cropState = null; // {photoId, natW, natH, FW, FH, baseScale, z, tx, ty, orientation}

function updateOrientButtons(){
  const isPortrait = cropState.orientation === 'portrait';
  document.getElementById('orientLandscapeBtn').classList.toggle('active', !isPortrait);
  document.getElementById('orientPortraitBtn').classList.toggle('active', isPortrait);
}

function initCropForOrientation(id, orientation){
  const p = photos.find(x => x.id === id);
  if(!p) return;
  const frame = document.getElementById('cropFrame');
  const imgEl = document.getElementById('cropImg');
  frame.style.aspectRatio = orientation === 'portrait' ? '3/4' : '4/3';

  const natImg = new Image();
  natImg.onload = function(){
    const frameRect = frame.getBoundingClientRect();
    const FW = frameRect.width, FH = frameRect.height;
    const natW = natImg.naturalWidth, natH = natImg.naturalHeight;
    const baseScale = Math.max(FW / natW, FH / natH);
    const sameOrientation = p.orientation === orientation && p.crop;
    const crop = sameOrientation ? p.crop : { zoom: 1, fx: 0.5, fy: 0.5 };
    const z = crop.zoom || 1;
    const imgW = natW * baseScale * z, imgH = natH * baseScale * z;
    const tx = imgW > FW ? -(crop.fx * (imgW - FW)) : (FW - imgW) / 2;
    const ty = imgH > FH ? -(crop.fy * (imgH - FH)) : (FH - imgH) / 2;

    cropState = { photoId: id, natW, natH, FW, FH, baseScale, z, tx, ty, orientation };
    imgEl.src = p.dataUrl;
    imgEl.style.width = imgW + 'px';
    imgEl.style.height = imgH + 'px';
    imgEl.style.transform = `translate(${tx}px, ${ty}px)`;
    document.getElementById('cropZoom').value = Math.round(z * 100);
    updateOrientButtons();
  };
  natImg.src = p.dataUrl;
}

function setCropOrientation(orientation){
  if(!cropState) return;
  initCropForOrientation(cropState.photoId, orientation);
}

function openCropEditor(id){
  const p = photos.find(x => x.id === id);
  if(!p) return;
  document.getElementById('cropModal').style.display = 'flex';

  const natImg = new Image();
  natImg.onload = function(){
    const defaultOrientation = p.orientation || (natImg.naturalWidth >= natImg.naturalHeight ? 'landscape' : 'portrait');
    initCropForOrientation(id, defaultOrientation);
  };
  natImg.src = p.dataUrl;
}

function closeCropEditor(){
  document.getElementById('cropModal').style.display = 'none';
  cropState = null;
}

function applyCropTransform(){
  const imgEl = document.getElementById('cropImg');
  const s = cropState;
  const imgW = s.natW * s.baseScale * s.z, imgH = s.natH * s.baseScale * s.z;
  s.tx = Math.min(0, Math.max(s.FW - imgW, s.tx));
  s.ty = Math.min(0, Math.max(s.FH - imgH, s.ty));
  imgEl.style.width = imgW + 'px';
  imgEl.style.height = imgH + 'px';
  imgEl.style.transform = `translate(${s.tx}px, ${s.ty}px)`;
}

(function setupCropInteractions(){
  const frame = document.getElementById('cropFrame');
  const zoomInput = document.getElementById('cropZoom');
  let dragging = false, lastX = 0, lastY = 0;

  frame.addEventListener('pointerdown', function(e){
    if(!cropState) return;
    dragging = true;
    lastX = e.clientX; lastY = e.clientY;
    frame.setPointerCapture(e.pointerId);
  });
  frame.addEventListener('pointermove', function(e){
    if(!dragging || !cropState) return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    cropState.tx += dx; cropState.ty += dy;
    applyCropTransform();
  });
  function endDrag(){ dragging = false; }
  frame.addEventListener('pointerup', endDrag);
  frame.addEventListener('pointercancel', endDrag);
  frame.addEventListener('pointerleave', endDrag);

  zoomInput.addEventListener('input', function(){
    if(!cropState) return;
    const s = cropState;
    const oldImgW = s.natW * s.baseScale * s.z, oldImgH = s.natH * s.baseScale * s.z;
    const cx = (s.FW / 2 - s.tx) / oldImgW, cy = (s.FH / 2 - s.ty) / oldImgH;
    s.z = zoomInput.value / 100;
    const newImgW = s.natW * s.baseScale * s.z, newImgH = s.natH * s.baseScale * s.z;
    s.tx = s.FW / 2 - cx * newImgW;
    s.ty = s.FH / 2 - cy * newImgH;
    applyCropTransform();
  });
})();

function saveCrop(){
  const s = cropState;
  if(!s) return;
  const p = photos.find(x => x.id === s.photoId);
  if(!p) return;

  const imgW = s.natW * s.baseScale * s.z, imgH = s.natH * s.baseScale * s.z;
  const fx = imgW > s.FW ? (-s.tx) / (imgW - s.FW) : 0.5;
  const fy = imgH > s.FH ? (-s.ty) / (imgH - s.FH) : 0.5;
  p.crop = { zoom: s.z, fx: Math.min(1, Math.max(0, fx)), fy: Math.min(1, Math.max(0, fy)) };
  p.orientation = s.orientation;

  // rasterize the visible region in natural-pixel space
  const scaleNatToCss = s.baseScale * s.z;
  const sWidth = Math.min(s.natW, s.FW / scaleNatToCss);
  const sHeight = Math.min(s.natH, s.FH / scaleNatToCss);
  const sx = Math.min(Math.max(0, (-s.tx) / scaleNatToCss), s.natW - sWidth);
  const sy = Math.min(Math.max(0, (-s.ty) / scaleNatToCss), s.natH - sHeight);

  const srcImg = new Image();
  srcImg.onload = function(){
    const outW = s.orientation === 'portrait' ? 750 : 1000;
    const outH = s.orientation === 'portrait' ? 1000 : 750;
    const canvas = document.createElement('canvas');
    canvas.width = outW; canvas.height = outH;
    canvas.getContext('2d').drawImage(srcImg, sx, sy, sWidth, sHeight, 0, 0, outW, outH);
    p.cropDataUrl = canvas.toDataURL('image/jpeg', 0.88);
    save(); render();
    closeCropEditor();
    showToast('Kırpma kaydedildi ✓');
  };
  srcImg.src = p.dataUrl;
}

let pdfLayout = 1;
function setPdfLayout(n){
  pdfLayout = n;
  document.getElementById('layout1Btn').classList.toggle('active', n === 1);
  document.getElementById('layout2Btn').classList.toggle('active', n === 2);
  document.getElementById('layout4Btn').classList.toggle('active', n === 4);
  document.getElementById('layoutSelectedLabel').textContent = `Seçili: sayfa başına ${n} fotoğraf`;
}

function openTitleModal(){
  if(photos.length === 0){ alert('Önce en az bir fotoğraf ekle.'); return; }
  setPdfLayout(1);
  document.getElementById('titleModal').style.display = 'flex';
}
function closeTitleModal(){
  document.getElementById('titleModal').style.display = 'none';
}

async function exportPdf(){
  const title = document.getElementById('albumTitleInput').value.trim() || 'Foto Albümüm';
  closeTitleModal();
  const overlay = document.getElementById('pdfOverlay');
  const progress = document.getElementById('pdfProgress');
  overlay.style.display = 'flex';

  let stage;
  try{
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: 'pt', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();

    // Turkish-character-safe rendering: build each page as an HTML node,
    // rasterize with html2canvas, then place the image into the PDF.
    stage = document.createElement('div');
    stage.style.position = 'fixed';
    stage.style.left = '-9999px';
    stage.style.top = '0';
    stage.style.width = '794px'; // ~A4 at 96dpi
    document.body.appendChild(stage);

    async function renderPageToPdf(innerHtml, isFirst){
      stage.innerHTML = innerHtml;
      await new Promise(r => setTimeout(r, 30));
      const canvas = await html2canvas(stage, { scale: 2, useCORS: true, backgroundColor: '#fffdf9' });
      const imgData = canvas.toDataURL('image/jpeg', 0.92);
      if(!isFirst) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, 0, pageW, pageH);
    }

    // Cover page
    const coverHtml = `
      <div style="width:794px;height:1123px;display:flex;flex-direction:column;align-items:center;
        justify-content:center;font-family:Georgia,serif;background:#fffdf9;padding:60px;">
        <div style="font-size:14px;letter-spacing:3px;color:#a8562e;text-transform:uppercase;margin-bottom:18px;">Foto Albüm</div>
        <div style="font-size:40px;font-weight:700;color:#2b2420;text-align:center;line-height:1.3;">${escapeHtml(title)}</div>
        <div style="margin-top:24px;font-size:14px;color:#7a6f60;">${photos.length} fotoğraf</div>
        <div style="margin-top:60px;font-size:12px;color:#b0a48f;">${new Date().toLocaleDateString('tr-TR')}</div>
      </div>`;
    await renderPageToPdf(coverHtml, true);

    const PAGE_W = 794, PAGE_H = 1123, PAD_X = 40, TOP = 44, BOTTOM_RESERVE = 34;
    const contentW = PAGE_W - PAD_X * 2;
    const contentH = PAGE_H - TOP - BOTTOM_RESERVE;

    function photoCellHtml(p, left, top, w, h, noteFontSize){
      const photoSrc = p.cropDataUrl || p.dataUrl;
      const hasNote = !!p.note;
      const noteH = hasNote ? Math.min(Math.round(h * 0.28), noteFontSize * 7) : 0;
      const imgAreaH = h - noteH;
      const noteHtml = hasNote
        ? `<div style="position:absolute;left:0;top:${imgAreaH}px;width:100%;height:${noteH}px;
             font-size:${noteFontSize}px;line-height:1.4;color:#2b2420;white-space:pre-wrap;
             font-family:Georgia,serif;overflow:hidden;text-align:left;">${escapeHtml(p.note)}</div>`
        : '';
      return `
        <div style="position:absolute;left:${left}px;top:${top}px;width:${w}px;height:${h}px;">
          <div style="position:absolute;left:0;top:0;width:100%;height:${imgAreaH}px;
            display:flex;align-items:center;justify-content:center;overflow:hidden;">
            <img src="${photoSrc}" style="max-width:100%;max-height:100%;object-fit:contain;
              border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.12);">
          </div>
          ${noteHtml}
        </div>`;
    }

    const perPage = pdfLayout;
    const pageCount = Math.ceil(photos.length / perPage);

    for(let pg = 0; pg < pageCount; pg++){
      const group = photos.slice(pg * perPage, pg * perPage + perPage);
      progress.textContent = `Sayfa ${pg+1} / ${pageCount}`;

      let cellsHtml = '';
      if(perPage === 1){
        cellsHtml = photoCellHtml(group[0], PAD_X, TOP, contentW, contentH, 15);
      } else if(perPage === 2){
        const gap = 24, cellH = (contentH - gap) / 2;
        group.forEach((p, i) => {
          cellsHtml += photoCellHtml(p, PAD_X, TOP + i * (cellH + gap), contentW, cellH, 13);
        });
      } else {
        const gap = 18;
        const cellW = (contentW - gap) / 2, cellH = (contentH - gap) / 2;
        group.forEach((p, i) => {
          const col = i % 2, row = Math.floor(i / 2);
          cellsHtml += photoCellHtml(p, PAD_X + col * (cellW + gap), TOP + row * (cellH + gap), cellW, cellH, 11);
        });
      }

      const pageHtml = `
        <div style="position:relative;width:${PAGE_W}px;height:${PAGE_H}px;background:#fffdf9;">
          ${cellsHtml}
          <div style="position:absolute;left:0;bottom:10px;width:100%;text-align:center;
            font-size:11px;color:#b0a48f;">${pg+1} / ${pageCount}</div>
        </div>`;
      await renderPageToPdf(pageHtml, false);
    }

    const fileName = `${title.replace(/[^\p{L}\p{N}\- ]/gu,'').trim() || 'foto-albumu'}.pdf`;

    if (window.AndroidFileSaver) {
      // Running inside the Android WebView wrapper: hand the PDF to native code
      // so it lands in the Downloads folder (in-browser downloads don't work in WebView).
      const base64 = pdf.output('datauristring').split(',')[1];
      window.AndroidFileSaver.saveBase64(base64, fileName);
    } else {
      pdf.save(fileName);
    }
  } catch(err){
    console.error('PDF oluşturma hatası:', err);
    alert('PDF oluşturulurken bir hata oluştu: ' + (err && err.message ? err.message : err));
  } finally {
    if(stage && stage.parentNode) document.body.removeChild(stage);
    overlay.style.display = 'none';
  }
}

load();
render();
</script>
</body>
</html>
